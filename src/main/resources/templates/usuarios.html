<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Usuários')}"></head>
<body>
<div th:replace="~{fragments :: menu}"></div>
<main class="container">

  <div class="page-header">
    <div>
      <div class="breadcrumb"><a th:href="@{/}">Home</a><span>›</span> Usuários</div>
      <h1>Usuários</h1>
    </div>
    <a class="btn btn-primary" th:href="@{/usuarios/novo}">+ Novo usuário</a>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Nome</th>
          <th>E-mail</th>
          <th>Tipo</th>
          <th>Telefone</th>
          <th>Ações</th>
        </tr>
      </thead>
      <tbody>
        <tr th:each="u : ${usuarios}">
          <td class="td-id" th:text="'#' + ${u.id}"></td>
          <td><strong th:text="${u.nome}"></strong></td>
          <td th:text="${u.email}"></td>
          <td><span class="badge" th:text="${u.tipo}"></span></td>
          <td th:text="${u.telefone}"></td>
          <td class="actions">
            <a class="btn btn-secondary" th:href="@{'/enderecos/'+${u.id}}">Endereço</a>
            <a class="btn btn-amber"     th:href="@{'/usuarios/editar/'+${u.id}}">Editar</a>
            <a class="btn btn-danger"    th:href="@{'/usuarios/excluir/'+${u.id}}">Excluir</a>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

</main>
<div th:replace="~{fragments :: footer}"></div>
</body>
</html>
