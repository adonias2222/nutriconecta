<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Alimento')}"></head>
<body>
<div th:replace="~{fragments :: menu}"></div>
<main class="container">

  <div class="page-header">
    <div>
      <div class="breadcrumb"><a th:href="@{/}">Home</a><span>›</span><a th:href="@{/alimentos/listar}">Alimentos</a><span>›</span> Cadastro</div>
      <h1>Cadastro de alimento</h1>
    </div>
  </div>

  <form class="form-card" th:action="@{/alimentos/salvar}" th:object="${alimento}" method="post">
    <input type="hidden" th:field="*{id}">

    <div class="field">
      <label>Nome do alimento</label>
      <input th:field="*{nome}" placeholder="Ex: Arroz branco" required>
    </div>
    <div class="field">
      <label>Categoria</label>
      <input th:field="*{categoria}" placeholder="Perecível, Não perecível, Hortifruti…">
    </div>
    <div class="field">
      <label>Unidade de medida</label>
      <input th:field="*{unidadeMedida}" placeholder="kg, un, L…">
    </div>

    <div class="form-actions">
      <button class="btn btn-primary" type="submit">Salvar</button>
      <a class="btn btn-secondary" th:href="@{/alimentos/listar}">Cancelar</a>
    </div>
  </form>

</main>
<div th:replace="~{fragments :: footer}"></div>
</body>
</html>
