<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Doações')}"></head>
<body>
<div th:replace="~{fragments :: menu}"></div>
<main class="container">

  <div class="page-header">
    <div>
      <div class="breadcrumb"><a th:href="@{/}">Home</a><span>›</span> Doações</div>
      <h1>Doações</h1>
    </div>
    <a class="btn btn-primary" th:href="@{/doacoes/nova}">+ Nova doação</a>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Título</th>
          <th>Doador</th>
          <th>Status</th>
          <th>Ações</th>
        </tr>
      </thead>
      <tbody>
        <tr th:each="d : ${doacoes}">
          <td class="td-id" th:text="'#' + ${d.id}"></td>
          <td><strong th:text="${d.titulo}"></strong></td>
          <td th:text="${d.doador.nome}"></td>
          <td><span class="badge" th:text="${d.status}"></span></td>
          <td class="actions">
            <a class="btn btn-secondary" th:href="@{'/doacoes/detalhes/'+${d.id}}">Detalhes</a>
            <a class="btn btn-outline"   th:href="@{'/itens/'+${d.id}}">Itens</a>
            <form th:action="@{/doacoes/status}" method="post">
              <input type="hidden" name="id" th:value="${d.id}">
              <select name="status">
                <option th:each="s : ${statusDoacao}" th:value="${s}" th:text="${s}"></option>
              </select>
              <button class="btn btn-amber">Alterar</button>
            </form>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

</main>
<div th:replace="~{fragments :: footer}"></div>
</body>
</html>
