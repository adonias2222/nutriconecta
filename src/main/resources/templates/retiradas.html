<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Retiradas')}"></head>
<body>
<div th:replace="~{fragments :: menu}"></div>
<main class="container">

  <div class="page-header">
    <div>
      <div class="breadcrumb"><a th:href="@{/}">Home</a><span>›</span> Retiradas</div>
      <h1>Retiradas</h1>
    </div>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Doação</th>
          <th>Instituição</th>
          <th>Responsável</th>
          <th>Data</th>
          <th>Observações</th>
        </tr>
      </thead>
      <tbody>
        <tr th:each="r : ${retiradas}">
          <td class="td-id" th:text="'#' + ${r.id}"></td>
          <td><strong th:text="${r.solicitacao.doacao.titulo}"></strong></td>
          <td th:text="${r.solicitacao.instituicao.nome}"></td>
          <td th:text="${r.responsavel}"></td>
          <td th:text="${r.dataRetirada}"></td>
          <td th:text="${r.observacoes}"></td>
        </tr>
      </tbody>
    </table>
  </div>

</main>
<div th:replace="~{fragments :: footer}"></div>
</body>
</html>
