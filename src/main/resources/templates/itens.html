<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Itens da Doação')}"></head>
<body>
<div th:replace="~{fragments :: menu}"></div>
<main class="container">

  <div class="page-header">
    <div>
      <div class="breadcrumb"><a th:href="@{/}">Home</a><span>›</span><a th:href="@{/doacoes/listar}">Doações</a><span>›</span> Itens</div>
      <h1>Itens — <em th:text="${doacao.titulo}" style="font-style:italic;color:var(--g700)"></em></h1>
    </div>
    <a class="btn btn-primary" th:href="@{'/itens/novo/'+${doacao.id}}">+ Novo item</a>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Alimento</th>
          <th>Categoria</th>
          <th>Quantidade</th>
          <th>Validade</th>
        </tr>
      </thead>
      <tbody>
        <tr th:each="i : ${itens}">
          <td><strong th:text="${i.alimento.nome}"></strong></td>
          <td><span class="badge badge-muted" th:text="${i.alimento.categoria}"></span></td>
          <td th:text="${i.quantidade + ' ' + i.alimento.unidadeMedida}"></td>
          <td th:text="${i.validade}"></td>
        </tr>
      </tbody>
    </table>
  </div>

</main>
<div th:replace="~{fragments :: footer}"></div>
</body>
</html>
