<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Alimentos')}"></head>
<body>
<div th:replace="~{fragments :: menu}"></div>
<main class="container">

  <div class="page-header">
    <div>
      <div class="breadcrumb"><a th:href="@{/}">Home</a><span>›</span> Alimentos</div>
      <h1>Alimentos</h1>
    </div>
    <a class="btn btn-primary" th:href="@{/alimentos/novo}">+ Novo alimento</a>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Nome</th>
          <th>Categoria</th>
          <th>Unidade</th>
        </tr>
      </thead>
      <tbody>
        <tr th:each="a : ${alimentos}">
          <td class="td-id" th:text="'#' + ${a.id}"></td>
          <td><strong th:text="${a.nome}"></strong></td>
          <td><span class="badge badge-muted" th:text="${a.categoria}"></span></td>
          <td th:text="${a.unidadeMedida}"></td>
        </tr>
      </tbody>
    </table>
  </div>

</main>
<div th:replace="~{fragments :: footer}"></div>
</body>
</html>
