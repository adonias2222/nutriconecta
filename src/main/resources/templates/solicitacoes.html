<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Solicitações')}"></head>
<body>
<div th:replace="~{fragments :: menu}"></div>
<main class="container">

  <div class="page-header">
    <div>
      <div class="breadcrumb"><a th:href="@{/}">Home</a><span>›</span> Solicitações</div>
      <h1>Solicitações</h1>
    </div>
    <a class="btn btn-primary" th:href="@{/solicitacoes/nova}">+ Nova solicitação</a>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Doação</th>
          <th>Instituição</th>
          <th>Status</th>
          <th>Ações</th>
        </tr>
      </thead>
      <tbody>
        <tr th:each="s : ${solicitacoes}">
          <td class="td-id" th:text="'#' + ${s.id}"></td>
          <td><strong th:text="${s.doacao.titulo}"></strong></td>
          <td th:text="${s.instituicao.nome}"></td>
          <td><span class="badge" th:text="${s.status}"></span></td>
          <td class="actions">
            <form th:action="@{/solicitacoes/status}" method="post">
              <input type="hidden" name="id" th:value="${s.id}">
              <select name="status">
                <option th:each="st : ${statusSolicitacao}" th:value="${st}" th:text="${st}"></option>
              </select>
              <button class="btn btn-amber">Alterar</button>
            </form>
            <a class="btn btn-primary" th:href="@{'/retiradas/nova/'+${s.id}}">Retirada</a>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

</main>
<div th:replace="~{fragments :: footer}"></div>
</body>
</html>
