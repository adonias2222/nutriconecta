<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Endereços')}"></head>
<body>
<div th:replace="~{fragments :: menu}"></div>
<main class="container">

  <div class="page-header">
    <div>
      <div class="breadcrumb"><a th:href="@{/}">Home</a><span>›</span><a th:href="@{/usuarios/listar}">Usuários</a><span>›</span> Endereços</div>
      <h1>Endereços — <em th:text="${usuario.nome}" style="font-style:italic;color:var(--g700)"></em></h1>
    </div>
    <a class="btn btn-primary" th:href="@{'/enderecos/novo/'+${usuario.id}}">+ Novo endereço</a>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Logradouro</th>
          <th>Número</th>
          <th>Bairro</th>
          <th>Cidade</th>
          <th>Estado</th>
          <th>CEP</th>
        </tr>
      </thead>
      <tbody>
        <tr th:each="e : ${enderecos}">
          <td th:text="${e.logradouro}"></td>
          <td th:text="${e.numero}"></td>
          <td th:text="${e.bairro}"></td>
          <td th:text="${e.cidade}"></td>
          <td><span class="badge badge-muted" th:text="${e.estado}"></span></td>
          <td th:text="${e.cep}"></td>
        </tr>
      </tbody>
    </table>
  </div>

</main>
<div th:replace="~{fragments :: footer}"></div>
</body>
</html>
