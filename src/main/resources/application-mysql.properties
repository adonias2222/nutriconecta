spring.application.name=nutriconecta

# Use assim, se quiser rodar com MySQL local:
# mvn spring-boot:run -Dspring-boot.run.profiles=mysql
spring.datasource.url=jdbc:mysql://localhost:3306/dbnutriconecta?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=America/Sao_Paulo&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

spring.thymeleaf.cache=false
server.port=8080
